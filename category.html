<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="News Sources - Graham and Doddsville. Curated financial news sources for value investors covering Australian and international markets.">
    <meta name="robots" content="index, follow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>News Sources - Graham and Doddsville</title>
    <link rel="stylesheet" href="/css/category.css">

    <!-- Favicon (same as main site) -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e3a8a'/%3E%3Ctext x='50' y='60' font-family='Georgia,serif' font-size='24' font-weight='bold' text-anchor='middle' fill='%23f5b400'%3EG%26D%3C/text%3E%3C/svg%3E">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "News Sources",
        "description": "Curated financial news sources for value investors",
        "publisher": {
            "@type": "Organization",
            "name": "Graham and Doddsville",
            "url": "https://grahamanddoddsville.com.au"
        }
    }
    </script>
</head>

<body class="category-page">

    <!-- Back Navigation Bar -->
    <nav class="category-back-nav" id="back-nav" role="navigation" aria-label="Back navigation">
        <a href="index.html" class="back-btn" id="back-link">
            <span class="back-arrow">←</span>
            <span class="back-label">Home</span>
        </a>
    </nav>

    <!-- Hero Header -->
    <header class="category-hero" id="category-hero">
        <span class="category-section-label" id="section-label">Loading...</span>
        <span class="category-icon" id="category-icon"></span>
        <h1 class="category-title" id="category-title">News Sources</h1>
        <p class="category-count" id="category-count"></p>
    </header>

    <!-- Divider -->
    <div class="sources-container" id="sources-container">
        <div class="sources-divider">
            <div class="sources-divider-line"></div>
            <span class="sources-divider-text" id="divider-text">Sources</span>
            <div class="sources-divider-line"></div>
        </div>

        <!-- Sources will be rendered here by JavaScript -->
        <div id="sources-list"></div>
    </div>

    <!-- Footer -->
    <footer class="category-footer" id="category-footer">
        <p class="footer-text">
            Graham and Doddsville Pty Ltd<br>
            <a href="index.html" class="footer-link">← Back to Home</a>
        </p>
    </footer>

    <!-- Load the data -->
    <script src="/news-sources-data.js"></script>
    <script>
</script>

    <!-- Page Logic -->
    <script>
        function closeMobileMenu() {
            const mobileDrawer = document.getElementById('mobile-drawer');
            if (mobileDrawer) {
                mobileDrawer.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        (function () {
            'use strict';

            // --- Parse URL parameters ---
            const urlParams = new URLSearchParams(window.location.search);
            const categoryType = urlParams.get('type') || '';

            // --- Get DOM references ---
            const backNav = document.getElementById('back-nav');
            const sectionLabel = document.getElementById('section-label');
            const categoryIcon = document.getElementById('category-icon');
            const categoryTitle = document.getElementById('category-title');
            const categoryCount = document.getElementById('category-count');
            const categoryHero = document.getElementById('category-hero');
            const sourcesList = document.getElementById('sources-list');
            const sourcesContainer = document.getElementById('sources-container');
            const dividerText = document.getElementById('divider-text');
            const footer = document.getElementById('category-footer');

            // --- Check if data exists ---
            if (typeof newsSourcesData === 'undefined' || typeof categoryMeta === 'undefined') {
                showEmpty('Data Error', 'Could not load news sources data.');
                return;
            }

            // --- Get category data ---
            const sources = newsSourcesData[categoryType];
            const meta = categoryMeta[categoryType];

            if (!sources || !meta) {
                showEmpty('Category Not Found', 'The requested news category does not exist.');
                return;
            }

            // --- Determine section type ---
            const isWorldSection = meta.section === 'Around the World';

            // --- Update page title ---
            document.title = `${meta.title} News Sources - Graham and Doddsville`;

            // --- Update meta description ---
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.content = `${meta.title} news sources curated by Graham and Doddsville. ${sources.length} trusted sources for ${meta.section.toLowerCase()} coverage.`;
            }

            // --- Apply section theming ---
            if (isWorldSection) {
                backNav.classList.add('world-section');
                categoryHero.classList.add('world-section');
                sourcesContainer.classList.add('world-variant');
                footer.classList.add('world-variant');
            }

            // --- Populate header ---
            sectionLabel.textContent = meta.section;
            categoryIcon.textContent = meta.icon;
            categoryTitle.textContent = meta.title;
            categoryCount.textContent = `${sources.length} curated source${sources.length !== 1 ? 's' : ''}`;
            dividerText.textContent = `${meta.title} Sources`;

            // --- Set CSS accent variable ---
            document.documentElement.style.setProperty('--card-accent', meta.accent);

            // --- Render source cards ---
            const fragment = document.createDocumentFragment();

            sources.forEach(function (source, index) {
                const card = document.createElement('a');
                card.href = source.url;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.className = 'source-card';
                card.id = 'source-' + (index + 1);
                card.setAttribute('aria-label', 'Open ' + source.name + ' in new tab');

                // Extract domain for display
                let domain = '';
                try {
                    const urlObj = new URL(source.url);
                    domain = urlObj.hostname.replace('www.', '');
                } catch (e) {
                    domain = source.url;
                }

                card.innerHTML =
                    '<span class="source-number">' + (index + 1) + '</span>' +
                    '<div class="source-info">' +
                    '  <p class="source-name">' + escapeHtml(source.name) + '</p>' +
                    '  <span class="source-domain">' + escapeHtml(domain) + '</span>' +
                    '</div>' +
                    '<span class="source-arrow">' +
                    '  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
                    '    <path d="M7 17L17 7"/>' +
                    '    <path d="M7 7h10v10"/>' +
                    '  </svg>' +
                    '</span>';

                fragment.appendChild(card);
            });

            sourcesList.appendChild(fragment);

            // --- Empty state handler ---
            function showEmpty(title, message) {
                categoryHero.style.display = 'none';
                sourcesContainer.innerHTML =
                    '<div class="category-empty">' +
                    '  <div class="empty-icon">📰</div>' +
                    '  <h2 class="empty-title">' + escapeHtml(title) + '</h2>' +
                    '  <p class="empty-text">' + escapeHtml(message) + '</p>' +
                    '  <a href="index.html" class="empty-home-link">Go to Homepage</a>' +
                    '</div>';
            }

            // --- HTML escape helper ---
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

        })();
    
        function toggleMobileMenu() {
            const mobileDrawer = document.getElementById('mobile-drawer');
            if (mobileDrawer) {
                if (mobileDrawer.classList.contains('open')) {
                    mobileDrawer.classList.remove('open');
                    document.body.style.overflow = '';
                } else {
                    mobileDrawer.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
            }
        }

        function toggleCollapsible(sectionId) {
            const content = document.getElementById(sectionId + '-content');
            const arrow = document.getElementById(sectionId + '-arrow');
            if (!content) return;
            
            const section = content.closest('.collapsible-section');
            const isCurrentlyOpen = content.classList.contains('expanded');
            
            // Close all other open sections
            document.querySelectorAll('.collapsible-content').forEach(c => {
                if (c.id !== sectionId + '-content' && (c.classList.contains('expanded') || c.style.maxHeight)) {
                    c.style.maxHeight = null;
                    c.classList.remove('expanded');
                    c.classList.add('collapsed');
                    const s = c.closest('.collapsible-section');
                    if (s) s.classList.remove('active');
                    const a = document.getElementById(c.id.replace('-content', '-arrow'));
                    if (a) a.innerHTML = '▼';
                }
            });

            if (!isCurrentlyOpen) {
                content.classList.add('expanded');
                content.classList.remove('collapsed');
                if(sectionId === 'events-seminars') {
                    content.style.maxHeight = 'none';
                } else {
                    const height = content.scrollHeight;
                    content.style.maxHeight = height + "px";
                }
                if (section) section.classList.add('active');
                if (arrow) arrow.innerHTML = '▲';
            } else {
                content.style.maxHeight = null;
                content.classList.remove('expanded');
                content.classList.add('collapsed');
                if (section) section.classList.remove('active');
                if (arrow) arrow.innerHTML = '▼';
            }
        }
    </script>

</body>

</html>
