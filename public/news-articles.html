    <script>
        // Start loading news immediately when page starts loading
        (function () {
            const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const isGitHubPages = window.location.hostname === 'l9rins.github.io';

            // Smart API URL selection
            let apiUrl;
            if (isLocalhost) {
                apiUrl = 'http://localhost:4012/api/news';
            } else if (isGitHubPages) {
                // For GitHub Pages, try localhost first, then fallback to static
                apiUrl = 'https://graham-doddsville.onrender.com/api/news';
                console.log('GitHub Pages detected - trying localhost API first');
            } else {
                apiUrl = 'https://graham-doddsville.onrender.com/api/news';
            }

            console.log('Preloading news from API:', apiUrl);

            // Preload news data in background
            fetch(apiUrl, {
                cache: 'no-cache', // Don't use cache for real news
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            }).then(response => {
                console.log('Preload API Response status:', response.status);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            }).then(data => {
                console.log('Preload API Response data:', data);
                if (data && data.articles && data.articles.length > 0) {
                    // Store in global cache for instant access
                    window.preloadedNews = data.articles;
                    // Also save to localStorage
                    try {
                        const cacheData = {
                            data: data.articles,
                            timestamp: Date.now(),
                            maxAge: 10 * 60 * 1000
                        };
                        localStorage.setItem('newsCache', JSON.stringify(cacheData));
                    } catch (e) {
                        console.log('Error saving preload to localStorage:', e);
                    }
                    console.log('Real news preloaded successfully:', data.articles.length, 'articles');
                } else {
                    console.log('Preload API returned empty data');
                }
            }).catch(error => {
                console.log('News preload failed:', error);
            });
        })();
    </script>

            <h1 class="news-page-title" id="category-title">Loading News...</h1>
        </div>

                <div class="footer-links" style="margin-top: 15px;">
                    <a href="about-us.html" style="color: white; margin: 0 10px; text-decoration: none;">About Us</a>

                </div>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        const urlParams = new URLSearchParams(window.location.search);
        let categoryType = urlParams.get('type');
        
        if (!categoryType) {
            window.location.href = 'index.html';
        }

        const typeToCategory = {
            'companies': 'Companies',
            'markets': 'Markets',
            'economy': 'Economy',
            'industry': 'Industry',
            'regulatory': 'Regulatory',
            'guru-watch': 'Guru Watch',
            'north-america': 'Around World',
            'europe': 'Around World',
            'asia': 'Around World',
            'elsewhere': 'Around World'
        };

        const categoryName = typeToCategory[categoryType] || categoryType;
        document.getElementById('category-title').textContent = categoryName + ' News';
        
        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                if (!response.ok) throw new Error('Failed to fetch news');
                
                const responseData = await response.json();
                const allNews = responseData.articles || responseData;
                
                let categoryNews = allNews.filter(article => {
                    if (categoryType === 'north-america' || categoryType === 'europe' || categoryType === 'asia' || categoryType === 'elsewhere') {
                        return article.category && article.category.toLowerCase().includes('world');
                    }
                    return article.category && article.category.toLowerCase().includes(categoryName.toLowerCase());
                });

                const container = document.getElementById('articles-container');
                container.innerHTML = '';

                if (categoryNews.length === 0) {
                    container.innerHTML = '<div class="loading-state">No recent articles found for this category.</div>';
                    return;
                }

                categoryNews.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'article-card';
                    
                    const pubDate = article.publishedAt ? new Date(article.publishedAt) : new Date();
                    
                    const diffMs = new Date() - pubDate;
                    const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                    let timeAgo = '';
                    if (diffHours < 1) {
                        const diffMins = Math.floor(diffMs / (1000 * 60));
                        timeAgo = `${diffMins} min ago`;
                    } else if (diffHours < 24) {
                        timeAgo = `${diffHours}h ago`;
                    } else {
                        const diffDays = Math.floor(diffHours / 24);
                        timeAgo = `${diffDays}d ago`;
                    }
                    
                    const sourceName = article.source?.name || article.source || 'News Source';

                    let cardInner = '';
                    if (categoryType === 'guru-watch') {
                        cardInner = `
                            <div class="article-card-source">${sourceName}</div>
                            <h3 class="article-card-title">
                                <a href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a>
                            </h3>
                            <div class="article-card-meta">
                                <span class="date">${pubDate.toLocaleDateString('en-AU', {day: 'numeric', month: 'short', year: 'numeric'})}</span>
                                <span class="time-ago">${timeAgo}</span>
                            </div>
                        `;
                    } else {
                        cardInner = `
                            ${article.image ? `<img src="${article.image}" alt="News thumbnail" onerror="this.style.display='none'">` : ''}
                            <div class="article-card-source">${sourceName}</div>
                            <h3 class="article-card-title">
                                <a href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a>
                            </h3>
                            <div class="article-card-excerpt">${article.excerpt || ''}</div>
                            <div class="article-card-meta">
                                <span class="date">${pubDate.toLocaleDateString('en-AU', {day: 'numeric', month: 'short', year: 'numeric'})}</span>
                                <span class="time-ago">${timeAgo}</span>
                            </div>
                        `;
                    }
                    card.innerHTML = cardInner;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading news:', error);
                document.getElementById('articles-container').innerHTML = '<div class="loading-state">Failed to load articles. Please try again later.</div>';
            }
        }

        loadNews();
    </script>
